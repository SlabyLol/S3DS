name: Build S3DS Snake

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup devkitPro
        uses: devkitPro/setup-devkitpro-action@v1

      - name: Install 3DS Development Packages
        run: |
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm 3ds-dev 3ds-citro3d 3ds-citro2d

      - name: Build Project
        run: make

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: S3DS-Snake
          path: |
            snake.3dsx
            snake.elf
