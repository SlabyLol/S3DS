name: Build S3DS Snake

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest     # ← Aktuelles stabiles Tag
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: PATH setzen
        run: |
          echo "PATH=$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH" >> $GITHUB_ENV

      - name: Build project
        run: make

      - name: Build-Ausgabe prüfen
        run: |
          echo "=== Verzeichnis ==="
          ls -la
          echo "=== Gefundene Build-Dateien ==="
          find . -name "*.3dsx" -o -name "*.elf" -o -name "*.smdh" 2>/dev/null || echo "Keine Dateien gefunden"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: S3DS-Snake
          path: |
            snake.3dsx
            snake.elf
            snake.smdh
          if-no-files-found: error
