name: Build S3DS Snake

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20250101   # Neuere Version
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install additional packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: PATH setzen
        run: |
          echo "PATH=$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH" >> $GITHUB_ENV

      - name: Build Project
        run: make

      - name: Build-Ausgabe prüfen
        run: |
          echo "=== Verzeichnis Inhalt ==="
          ls -la
          echo "=== Gefundene Dateien ==="
          find . -name "*.3dsx" -o -name "*.elf" -o -name "*.smdh" -o -name "*.cia" 2>/dev/null || echo "Keine Build-Dateien gefunden"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: S3DS-Snake
          path: |
            snake.3dsx
            snake.elf
            snake.smdh
          if-no-files-found: error
