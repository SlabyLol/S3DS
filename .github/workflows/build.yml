name: Build 3DS Snake

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitarm:20240202
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PATH
        run: |
          echo "PATH=$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH" >> $GITHUB_ENV

      - name: Update pacman
        run: |
          dkp-pacman -Sy --noconfirm

      - name: Install 3DS Libraries
        run: |
          dkp-pacman -S --noconfirm \
            3ds-dev \
            3ds-citro2d \
            3ds-citro3d

      - name: Show Environment
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          which arm-none-eabi-g++
          ls /opt/devkitpro
          ls /opt/devkitpro/devkitARM

      - name: Build Project
        run: |
          make

      - name: Show Build Files
        run: |
          echo "=== BUILD OUTPUT ==="
          find . -type f \( -name "*.3dsx" -o -name "*.elf" -o -name "*.cia" -o -name "*.smdh" \)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snake3ds-build
          path: |
            **/*.3dsx
            **/*.elf
            **/*.cia
            **/*.smdh
          if-no-files-found: error
