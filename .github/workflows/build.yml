name: Build S3DS Snake

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize devkitPro pacman + Install 3DS tools
        run: |
          # Schlüssel und Repos initialisieren
          dkp-pacman -Sy --noconfirm
          dkp-pacman -S --noconfirm --needed 3ds-dev 3ds-citro3d 3ds-citro2d

      - name: PATH setzen
        run: echo "PATH=$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH" >> $GITHUB_ENV

      - name: Build
        run: make -j2

      - name: Show output
        run: |
          ls -la
          echo "=== Build files ==="
          find . -name "*.3dsx" -o -name "*.elf" -o -name "*.smdh"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: S3DS-Snake
          path: |
            snake.3dsx
            snake.elf
          if-no-files-found: error
