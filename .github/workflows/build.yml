name: Build S3DS Snake

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install 3DS packages
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm 3ds-dev 3ds-citro3d 3ds-citro2d

      - name: PATH setzen
        run: |
          echo "PATH=$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH" >> $GITHUB_ENV

      - name: Build project
        run: make

      - name: Show build files
        run: |
          ls -la
          find . -name "*.3dsx" -o -name "*.elf" -o -name "*.smdh"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: S3DS-Snake
          path: |
            snake.3dsx
            snake.elf
            snake.smdh
          if-no-files-found: error
